
plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

application {
    mainClass = 'ax.dkarlsso.game_management.CdkApp'
}

group = 'ax.dkarlsso'
version = '1.0'

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(25))
    }
}

dependencies {
    compileOnly 'org.projectlombok:lombok:1.18.42'
    annotationProcessor 'org.projectlombok:lombok:1.18.42'

    implementation 'software.amazon.awscdk:aws-cdk-lib:2.241.0'
    implementation 'software.constructs:constructs:10.5.1'
}